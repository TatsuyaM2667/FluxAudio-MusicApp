name: Build iOS App (Unsigned IPA)
on:
  workflow_dispatch:

jobs:
  build:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Node Dependencies
        run: npm ci

      - name: Build Web App
        run: npm run build

      # -------------------------------------------------------------------
      # iOS Platform Setup
      # cap add ios runs "cap sync" internally which needs a Podfile.
      # To break that cycle, we:
      #   1. Let cap add ios create the Xcode project (it will fail at sync)
      #   2. Then run pod install manually once the Podfile exists
      # -------------------------------------------------------------------
      - name: Add iOS Platform
        run: npx cap add ios || true   # allow failure; Podfile is created before sync fails

      - name: Verify Podfile exists
        run: |
          if [ ! -f ios/App/Podfile ]; then
            echo "ERROR: Podfile was not generated by cap add ios"
            ls -la ios/App/ || true
            exit 1
          fi
          echo "Podfile found!"
          cat ios/App/Podfile

      - name: Install CocoaPods dependencies
        run: |
          cd ios/App
          pod install

      - name: Copy web assets to iOS
        run: npx cap copy ios

      - name: Update iOS plugins (without pod install)
        run: npx cap update ios --no-deps || true

      - name: Build Unsigned App
        run: |
          cd ios/App
          xcodebuild build \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER=""

      - name: Package into IPA
        run: |
          cd ios/App
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/App.app Payload/
          zip -r ../../FluxAudio-iOS.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FluxAudio-iOS-unsigned.ipa
          path: FluxAudio-iOS.ipa
